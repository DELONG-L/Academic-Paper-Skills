version: 1
registry: paper-policy-sets
default_sets: [integrity-core, academic-defaults]
sets:
  - id: integrity-core
    description: Non-negotiable research-integrity, evidence, provenance, and safe-mutation rules.
    includes: []
    hard_rules:
      - AUTH.INTEGRITY_PRECEDENCE
      - FACT.NO_FABRICATION
      - CLAIM.EVIDENCE_BOUND
      - CLAIM.CAUSALITY_DISCIPLINE
      - CLAIM.SECURITY_SCOPE
      - CLAIM.NOVELTY_SUPPORT
      - CLAIM.CAVEAT_PRESERVED
      - PROSE.ANTI_AI_MEANING_PRESERVATION
      - WORKFLOW.NO_AI_DETECTOR_GATE
      - CLAIM.KNOWN_BIAS_DIRECTION
      - CITE.NO_MEMORY_BIBTEX
      - CITE.NO_INVENTED_SUPPORT
      - CITE.SOURCE_LOCATOR_REQUIRED
      - LATEX.PRESERVE_STRUCTURE
      - PROSE.NO_INTERNAL_PROVENANCE
      - PROSE.EVIDENCE_BOUND_LANGUAGE
      - PROSE.ACADEMIC_VOICE_BOUNDARY
      - STRUCT.CONCLUSION_NO_NEW_CLAIMS
      - TABLE.PROPOSED_ROW_GROUNDED
      - TABLE.VALUES_GROUNDED
      - FIG.SOURCE_DATA_REQUIRED
      - FIG.NO_INVENTED_COMPONENTS
      - FIG.FINAL_WIDTH_READABLE
      - FIG.FINAL_EXPORT_ACCESSIBILITY
      - FIG.TRACEABLE_SCRIPT
      - RESULTS.FABRICATED_DISCLOSURE
      - FINAL.NO_UNRESOLVED_MARKERS
      - VENUE.CONSTRAINT_PROVENANCE
      - ANON.DOUBLE_BLIND
      - EXPERIMENT.STOCHASTIC_UNCERTAINTY
      - METHOD.EVIDENCE_ROLE_BOUNDARY
      - EXPERIMENT.ACTUAL_RUN_CONFIRMATION
      - REVIEW.ARCHITECTURE_SAFETY
      - AUTOFIX.SEMANTIC_APPROVAL
      - AUTOFIX.SAFE_LOSSLESS
      - STYLE.MINING_APPROVAL
    soft_rules: []

  - id: academic-defaults
    description: Broad academic workflow and presentation defaults that remain context-sensitive.
    includes: [integrity-core]
    hard_rules:
      - ROUTE.SKILL_BOUNDARY
      - CITE.APPROVED_SOURCE_ONLY
      - CITE.UNUSED_KEYS_REPORTED
      - LATEX.REFERENCEABLE_DISPLAY
      - PROSE.ABBREVIATION_FIRST_USE
      - PROSE.TERMINOLOGY_AND_FORMATTING
      - STRUCT.INTRO_CONCRETE_GAP
      - THREATS.CLAIM_MITIGATION_RESIDUAL
      - RESULTS.CLAIM_MAPPING
      - SOK.REQUIRED_CONTENT
      - EXPERIMENT.REPRODUCIBILITY
      - REVIEW.NO_UNNECESSARY_EXPERIMENTS
      - WORKFLOW.COMPLEX_TASK_STATE
      - WORKFLOW.COLD_READER_AUTHORIZATION
    soft_rules:
      - CLAIM.LADDER
      - STRUCT.ARGUMENTATIVE_SPINE
      - STRUCT.THIN_SUBSECTION
      - STRUCT.INTRO_ROADMAP
      - ABSTRACT.FIVE_MOVES
      - INTRO.RQ_FRAMING
      - INTRO.RQ_RESPONSE_MAP
      - PARAGRAPH.ONE_JOB
      - RESULTS.FOUR_MOVE
      - METHOD.EVIDENCE_ROLE_LEDGER
      - THREATS.ADAPTIVE_TAXONOMY
      - OUTPUT.CONCRETE_REWRITE
      - CITE.PLACEMENT_AND_GROUPING
      - CITE.UNUSED_KEY_REPORTING
      - LATEX.MATH_AND_REFERENCE_STYLE
      - PROFILE.COMPOSITION
      - PROSE.AUTHOR_VOICE
      - PROSE.FILLER_AND_PROMOTION
      - PROSE.FORMULAIC_PATTERNS
      - PROSE.LIST_AND_RHYTHM
      - PROSE.SENTENCE_LENGTH_WARNING
      - RELATED.AXIS_ORGANIZATION
      - RELATED.DIMENSION_BUDGET
      - TABLE.RELATED_ROW_GRANULARITY
      - TABLE.TARGET_WIDTH
      - TABLE.CAPTION_AND_HIGHLIGHT
      - TABLE.DENSE_EMPIRICAL_STYLE
      - TABLE.MISSING_VALUE_LABELS
      - FIG.EXPORT_AND_ACCESSIBILITY
      - FIG.SOURCE_FONT_SCALE
      - FIG.ONE_SCRIPT_PER_SEMANTIC_FIGURE
      - FIG.CAPTION_SELF_CONTAINED
      - REVIEW.SUBSTANCE_VS_MISREAD

  - id: strict-house-style
    description: Optional opinionated house rules; disabled by default and hard only after explicit opt-in.
    includes: [academic-defaults]
    hard_rules:
      - CONTRIB.ARTIFACT_REQUIRED
      - LATEX.NO_DOLLAR_DISPLAY
      - LATEX.NO_BRACKET_DISPLAY
      - PROSE.EM_DASH_FORBIDDEN
      - PROSE.NO_UNICODE_ARROWS
      - STRUCT.TRADITIONAL_HEADINGS
      - STRUCT.SECTION_COUNT_PROFILE
      - STRUCT.CONCLUSION_SINGLE_PARAGRAPH
      - STRUCT.CONCLUSION_INTEGRATES_LIMITATIONS
      - RELATED.COMPARISON_REQUIRED
      - TABLE.CANONICAL_RELATED_MARKERS
      - TABLE.BOOKTABS_FINAL
      - TABLE.FINAL_TARGET_WIDTH
      - FIG.NO_IN_FIGURE_TITLE
      - FIG.CONCEPT_HOUSE_STYLE
      - FIG.CONCEPT_TYPOGRAPHY
      - FIG.CONCEPT_MODEL_NATIVE_OUTPUT
      - RESULTS.RQ_EXPLICIT_ANSWER
    soft_rules:
      - CONTRIB.COUNT
      - STRUCT.SECTION_COUNT
      - RESULTS.RQ_ANSWER_BOX
      - PROSE.ROMAN_TEXT_DEFAULT
      - TABLE.SINGLE_COLUMN_FIRST
      - TABLE.NO_DIRECTION_ARROWS
      - FIG.CONCEPT_COUNT
      - FIG.SYSTEM_ASPECT_RATIO
