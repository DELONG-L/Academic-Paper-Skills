version: 1
registry: paper-policy-hard
rules:
  - id: AUTH.INTEGRITY_PRECEDENCE
    title: Integrity outranks style
    force: hard
    scope: [workflow, writing, review, figures, tables, citations]
    artifacts: [policy, prose, tex, bibtex, figure, table, paper_outline]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Never relax an academic-integrity rule to satisfy house style, venue rhetoric, or user preference.
    checks:
      - {kind: manual, evidence_required: true, description: 'Confirm every conflict resolution preserves truth and evidence boundaries.'}
    failure: {draft: block, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [A01, A02, A03, A11, A12, A13, A14, A15]
    source: {origin: user-decision, note: 'Core authority rule.'}

  - id: ROUTE.SKILL_BOUNDARY
    title: Preserve skill ownership boundaries
    force: hard
    scope: [workflow]
    artifacts: [policy]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Route prose, review, artifacts, and evidence work to their owning skills and never claim an unperformed handoff is complete.
    checks:
      - {kind: manual, evidence_required: true, description: 'Compare the requested deliverable with the owning skill contract.'}
    failure: {draft: report, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [A05, A06, A07, A08, G14]
    source: {origin: local-house-policy, note: 'Modular architecture boundary.'}

  - id: FACT.NO_FABRICATION
    title: No fabricated facts or results
    force: hard
    scope: [writing, review, figures, tables, citations]
    artifacts: [prose, figure, table, bibtex]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not invent facts, experiments, baselines, metrics, p-values, years, venues, trends, error bars, sample sizes, or system components.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Trace each factual assertion and artifact value to user-provided or approved evidence.'}
    failure: {draft: placeholder, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [B01, B09, I02, J03]
    source: {origin: local-house-policy, note: 'Non-waivable integrity rule.'}

  - id: CLAIM.EVIDENCE_BOUND
    title: Claims stay within evidence
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Keep every claim within the supplied evidence, experiment scope, threat model, dataset, and workload boundary.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Compare the claim verb and scope with its evidence anchor.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [B02, B05, B07, B10, J15]
    source: {origin: local-house-policy, note: 'Claim calibration hard core.'}

  - id: CLAIM.CAUSALITY_DISCIPLINE
    title: Separate observation, association, and causation
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not express descriptive observations or correlations as causal findings without a causal design.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Match causal verbs to the study design and supplied evidence.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [B03]
    source: {origin: local-house-policy, note: 'Evidence-language integrity.'}

  - id: CLAIM.SECURITY_SCOPE
    title: Do not imply unsupported cryptographic guarantees
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: paper_type, when: [security, systems, protocol]}
    requirement: Do not describe empirical, interface-level, or systems mechanisms as cryptographic guarantees unless formally supported.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Compare security wording with the threat model, construction, and proof evidence.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [B04]
    source: {origin: local-house-policy, note: 'Security claim boundary.'}

  - id: CLAIM.NOVELTY_SUPPORT
    title: Novelty and SOTA claims require comparison evidence
    force: hard
    scope: [writing, review, citations]
    artifacts: [prose]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Use first, novel, state-of-the-art, or equivalent claims only with an approved comparison or sufficient evidence.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Locate the curated comparison or user confirmation supporting the novelty scope.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [B11]
    source: {origin: local-house-policy, note: 'Novelty integrity.'}

  - id: CLAIM.CAVEAT_PRESERVED
    title: Preserve required caveats
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not delete a required limitation, scope condition, threat boundary, or overclaim defense during compression or structural editing.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Trace every removed caveat to a surviving home and confirm it remains visible.'}
    failure: {draft: block, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [B06, B15, K06, K07]
    source: {origin: user-decision, note: 'Limitations and structural safety.'}

  - id: PROSE.ANTI_AI_MEANING_PRESERVATION
    title: Anti-AI cleanup preserves scientific meaning
    force: hard
    scope: [writing, review, workflow]
    artifacts: [prose, tex, policy]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: mode, when: [anti_ai_cleanup, prose_cleanup, writing_anti_ai]}
    requirement: During Anti-AI cleanup, preserve claim strength, causal status, evidence scope, limitations, technical terminology, citation attachment, quantitative facts, and the author's explicit evidence-bound position; do not trade scientific meaning for stylistic variation.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Compare the source and revision claim by claim, including modality, causal verbs, qualifiers, terminology, citation attachment, values, and required caveats.'}
    failure: {draft: block, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [N07]
    source: {origin: user-decision, note: 'Independently authored integrity boundary informed by comparative review of public Anti-AI guidance.'}

  - id: WORKFLOW.NO_AI_DETECTOR_GATE
    title: Do not use AI-detector or authorship scores as a gate
    force: hard
    scope: [workflow, writing, review]
    artifacts: [policy, prose]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: mode, when: [anti_ai_cleanup, prose_cleanup, writing_anti_ai, authorship_review, detector_review]}
    requirement: Do not use AI-detector, perplexity, authenticity, human-likeness, or equivalent scores to assign manuscript compliance, submission readiness, or authorship; do not alter prose to evade such detectors. Diagnose concrete textual defects without claiming AI authorship from style alone.
    checks:
      - {kind: manual, evidence_required: true, description: 'Inspect the audit rationale and rewrite objective for detector-based gating, evasion tactics, or unsupported authorship inference.'}
    failure: {draft: block, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [N08]
    source: {origin: user-decision, note: 'Independently authored detector-safety rule; no external implementation or text is incorporated.'}

  - id: CLAIM.KNOWN_BIAS_DIRECTION
    title: Disclose the direction of known measurement bias
    force: hard
    scope: [writing, review]
    artifacts: [prose, figure, table]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: profile, when: [known-measurement-bias]}
    requirement: For each characterized systematic measurement, extraction, missingness, or labeling error, state the evidence for its direction, identify the affected claims or metrics, and say whether it makes each conclusion conservative, anti-conservative, or directionally indeterminate; do not assert a direction without support.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Trace the error mechanism to an affected claim or metric and verify the stated direction or explicit indeterminacy against supplied evidence.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [N01]
    source: {origin: user-decision, note: 'Conditional hard rule informed by reference-paper evidence architecture; no text or data reproduced.'}

  - id: CONTRIB.ARTIFACT_REQUIRED
    title: Contributions name concrete artifacts
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [draft, polish, submission, camera_ready]
    activation: {type: feature, when: [contribution_list]}
    requirement: Each contribution item must name a concrete artifact and must not consist only of proposing a method or running experiments.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Identify the dataset, benchmark, taxonomy, mechanism, protocol, evaluation, or release in each item.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [B12, B13]
    source: {origin: local-house-policy, note: 'House-default contribution contract.'}

  - id: CITE.NO_MEMORY_BIBTEX
    title: Never generate citations from memory
    force: hard
    scope: [writing, review, citations]
    artifacts: [prose, bibtex]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Never invent a paper, author, year, DOI, BibTeX entry, or citation key from memory.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Require an approved local source or explicit citation-audit result.'}
    failure: {draft: placeholder, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [C01, C03, C13]
    source: {origin: local-house-policy, note: 'Citation integrity.'}

  - id: CITE.APPROVED_SOURCE_ONLY
    title: Use approved citation sources by default
    force: hard
    scope: [writing, review, citations]
    artifacts: [prose, bibtex]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Use only sources declared in approved_citation_sources, existing manuscript keys, user-provided materials, or evidence verified through an explicitly activated citation-audit workflow.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Compare manuscript keys with approved bibliography sources.'}
      - {kind: manual, evidence_required: true, description: 'Confirm any non-local source was explicitly authorized.'}
    failure: {draft: placeholder, final: block}
    autofix: none
    waiver: {allowed: true, authorities: [user]}
    decision_refs: [C02, C04, X01, X02]
    source: {origin: user-decision, note: 'Local-BibTeX-first default.'}

  - id: CITE.NO_INVENTED_SUPPORT
    title: Do not infer support from metadata
    force: hard
    scope: [writing, review, citations]
    artifacts: [prose, bibtex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not claim that a paper supports a specific statement merely because its title, DOI, URL, or metadata matches.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Require user-provided material, a source span, manuscript context, or an approved evidence record for specific claims.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [C05, C08, C09]
    source: {origin: local-house-policy, note: 'Metadata is not claim support.'}

  - id: CITE.SOURCE_LOCATOR_REQUIRED
    title: Specific quotations and paraphrases require locators
    force: hard
    scope: [citations, review, writing]
    artifacts: [prose]
    phases: [polish, submission, rebuttal, camera_ready]
    activation: {type: profile, when: [citation-audit, final-citation-check]}
    requirement: Record a verbatim span and locator for direct quotations and a semantically matching source span and locator for specific paraphrases.
    checks:
      - {kind: manual, evidence_required: true, description: 'Inspect the source span, page or section locator, claim type, and status.'}
    failure: {draft: placeholder, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [C06, C07, C19, M08]
    source: {origin: imported-design, note: 'Claim-span ledger compatible with user-selected evidence workflows.'}

  - id: CITE.UNUSED_KEYS_REPORTED
    title: Final citation checks report unused keys
    force: hard
    scope: [citations, review]
    artifacts: [bibtex]
    phases: [submission, camera_ready]
    activation: {type: profile, when: [final-citation-check]}
    requirement: Report unused bibliography keys during a final citation check without deleting or renaming them automatically.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Compare local bibliography keys with manuscript citation keys.'}
    failure: {draft: report, final: report}
    autofix: none
    waiver: {allowed: true, authorities: [user]}
    decision_refs: [C16]
    source: {origin: user-decision, note: 'Final citation hygiene.'}

  - id: LATEX.PRESERVE_STRUCTURE
    title: Preserve LaTeX structure during rewriting
    force: hard
    scope: [writing, review]
    artifacts: [tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: feature, when: [latex_manuscript]}
    requirement: Preserve citations, labels, references, equations, math, and macros unless the user explicitly requests a coordinated refactor.
    checks:
      - {kind: manual, evidence_required: true, description: 'Compare protected LaTeX tokens in the before/after diff and inspect every coordinated change.'}
      - {kind: semantic, evidence_required: true, description: 'Confirm citation attachment and mathematical meaning are unchanged.'}
    failure: {draft: block, final: block}
    autofix: none
    waiver: {allowed: true, authorities: [user]}
    decision_refs: [D01, D02]
    source: {origin: local-house-policy, note: 'LaTeX preservation contract.'}

  - id: LATEX.REFERENCEABLE_DISPLAY
    title: Referenceable displays use structured environments
    force: hard
    scope: [writing, review]
    artifacts: [tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: feature, when: [latex_manuscript]}
    requirement: Use a numbered equation or align environment with a label for every displayed expression referenced elsewhere in the manuscript.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Check referenced display environments for labels and numbered equation or align forms.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [D03]
    source: {origin: user-decision, note: 'Referenceable display contract.'}

  - id: PROSE.ABBREVIATION_FIRST_USE
    title: Expand abbreviations on first use
    force: hard
    scope: [writing, review]
    artifacts: [prose, tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Expand each non-standard abbreviation at first use and use it consistently afterward.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Locate the first use and later occurrences of each abbreviation.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [D12]
    source: {origin: user-decision, note: 'Abbreviation hygiene.'}

  - id: LATEX.NO_DOLLAR_DISPLAY
    title: Ban double-dollar display math
    force: hard
    scope: [writing, review]
    artifacts: [tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: feature, when: [latex_manuscript]}
    requirement: Do not use double-dollar display math; use equation or align families.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Search uncommented TeX for double-dollar delimiters.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [D04, X24]
    source: {origin: user-decision, note: 'Global LaTeX style rule.'}

  - id: LATEX.NO_BRACKET_DISPLAY
    title: Ban bracket display math
    force: hard
    scope: [writing, review]
    artifacts: [tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not use bracket display math; use equation, equation*, align, or align*.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Search uncommented TeX for bracket display delimiters.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [D05, X24]
    source: {origin: user-decision, note: 'Global LaTeX style rule.'}

  - id: PROSE.NO_INTERNAL_PROVENANCE
    title: Keep internal provenance out of paper prose
    force: hard
    scope: [writing, review, figures, tables]
    artifacts: [prose, tex, figure, table]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Keep local paths, script names, renderer names, DPI checks, placeholder status, and workflow notes out of paper prose and captions.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Search paper-facing text for common path, script, renderer, and workflow markers.'}
      - {kind: semantic, evidence_required: true, description: 'Distinguish internal workflow details from scientifically necessary provenance.'}
    failure: {draft: report, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [D08, D10, F22]
    source: {origin: local-house-policy, note: 'Originated in Academic-Paper-Skills.'}

  - id: PROSE.EM_DASH_FORBIDDEN
    title: Ban em dashes in paper prose
    force: hard
    scope: [writing, review]
    artifacts: [prose, tex]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not use Unicode em dash or LaTeX triple hyphen as an em dash in paper prose; table cells and code-like literals are outside this prose-only rule.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Search prose for Unicode em dash and LaTeX triple hyphen outside commands and numeric ranges.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [F11, X10]
    source: {origin: user-decision, note: 'Ordinary hyphens, numeric ranges, mathematical minus signs, and non-prose table cells are excluded.'}

  - id: PROSE.EVIDENCE_BOUND_LANGUAGE
    title: Evidence-bound intensifiers and attributions
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Use significant, substantial, remarkable, research shows, experts argue, and equivalent language only with a specific value, statistical meaning, or source.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Inspect the nearby value, statistical definition, or citation evidence.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [F07, F08]
    source: {origin: local-house-policy, note: 'Evidence-language guardrail.'}

  - id: PROSE.NO_UNICODE_ARROWS
    title: Ban Unicode arrows in paper prose
    force: hard
    scope: [writing, review]
    artifacts: [prose, tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: feature, when: [paper_prose]}
    requirement: Do not use Unicode arrow characters in paper prose; use words or LaTeX notation when direction is scientifically required.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Search paper prose for Unicode arrow characters.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [F27]
    source: {origin: user-decision, note: 'Table header direction remains governed by the soft no-arrow rule.'}

  - id: PROSE.ACADEMIC_VOICE_BOUNDARY
    title: Keep author voice academic and evidence-bound
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [outline, draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Allow measured author judgment without casual humanizer language, evidence-free opinion, or humor substituting for analysis.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Confirm judgment is tied to a design choice, evidence boundary, or explicit author position.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [F20, X16]
    source: {origin: user-decision, note: 'Measured voice allowed; casual humanization is not.'}

  - id: PROSE.TERMINOLOGY_AND_FORMATTING
    title: Preserve technical terminology and formatting restraint
    force: hard
    scope: [writing, review]
    artifacts: [prose, tex]
    phases: [draft, polish, submission, rebuttal, camera_ready]
    activation: {type: always, when: []}
    requirement: Do not vary technical terms merely for style, and do not use frequent italics or monospace text as a substitute for structure.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Check term identity and whether special typography carries a necessary semantic role.'}
    failure: {draft: report, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [F14, F25, F26]
    source: {origin: local-house-policy, note: 'Terminology and typography discipline.'}

  - id: STRUCT.TRADITIONAL_HEADINGS
    title: Use traditional concise top-level headings
    force: hard
    scope: [writing, review]
    artifacts: [tex, paper_outline]
    phases: [outline, draft, polish, submission, camera_ready]
    activation: {type: always, when: []}
    requirement: Use traditional concise top-level section names and avoid rhetorical, metaphorical, question, or long colon titles.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Compare headings with paper function and activated venue requirements.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [E01, E02]
    source: {origin: user-decision, note: 'House hard structure rule.'}

  - id: STRUCT.INTRO_CONCRETE_GAP
    title: Introduction states a concrete gap
    force: hard
    scope: [writing, review]
    artifacts: [prose]
    phases: [draft, polish, submission, camera_ready]
    activation: {type: feature, when: [introduction]}
    requirement: State what prior work can support and what it cannot interpret, measure, enforce, or compare; do not use a generic limitations sentence as the gap.
    checks:
      - {kind: semantic, evidence_required: true, description: 'Identify the explicit missing boundary or comparison axis.'}
    failure: {draft: narrow, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [E12]
    source: {origin: local-house-policy, note: 'Gap standard.'}

  - id: STRUCT.SECTION_COUNT_PROFILE
    title: Standard conference profile uses five to seven sections
    force: hard
    scope: [writing, review]
    artifacts: [paper_outline, tex]
    phases: [outline, draft, polish, submission]
    activation: {type: profile, when: [standard-conference-structure]}
    requirement: Keep the main paper between five and seven top-level sections unless a reliable venue template requires another structure.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Count top-level numbered sections and compare with the active venue profile.'}
    failure: {draft: report, final: block}
    autofix: none
    waiver: {allowed: true, authorities: [user, venue]}
    decision_refs: [E03]
    source: {origin: user-decision, note: 'Conditional hard profile with a soft general default.'}

  - id: STRUCT.CONCLUSION_SINGLE_PARAGRAPH
    title: Conclusion is one paragraph
    force: hard
    scope: [writing, review]
    artifacts: [prose, tex]
    phases: [draft, polish, submission, camera_ready]
    activation: {type: feature, when: [conclusion]}
    requirement: Write the Conclusion as exactly one substantive paragraph.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Count non-empty paragraphs inside the Conclusion section.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: true, authorities: [venue]}
    decision_refs: [E18, E19, X08]
    source: {origin: user-decision, note: 'Global house hard rule; reliable venue requirements may override.'}

  - id: STRUCT.CONCLUSION_INTEGRATES_LIMITATIONS
    title: Conclusion integrates limitations
    force: hard
    scope: [writing, review]
    artifacts: [prose, tex]
    phases: [draft, polish, submission, camera_ready]
    activation: {type: feature, when: [conclusion]}
    requirement: Do not create a standalone top-level Limitations section; integrate the key limitations or scope boundary into the single-paragraph Conclusion.
    checks:
      - {kind: deterministic, evidence_required: false, description: 'Search the main manuscript for a standalone top-level Limitations section.'}
      - {kind: semantic, evidence_required: true, description: 'Locate the concise limitation statement and trace it to the manuscript evidence boundary.'}
    failure: {draft: block, final: block}
    autofix: assisted
    waiver: {allowed: false, authorities: []}
    decision_refs: [B06, E07, E19, X25]
    source: {origin: user-decision, note: 'Reverse-hard Limitations placement.'}

