version: 1
rules:
  - id: TEST.HARD_RULE
    title: Valid hard rule
    force: hard
    scope: [workflow]
    artifacts: [policy]
    phases: [draft]
    activation: {type: profile, when: [test-profile]}
    requirement: Pass the fixture.
    checks:
      - {kind: deterministic, evidence_required: false, description: Check fixture structure.}
    failure: {draft: block, final: block}
    autofix: none
    waiver: {allowed: false, authorities: []}
    decision_refs: [A01]
    source: {origin: local-house-policy, note: Test fixture.}
